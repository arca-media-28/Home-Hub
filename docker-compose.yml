version: "3.9"

services:
  homelab-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homelab-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # SQLite database file and uploaded images live in the mounted /data volume
      - DATA_DIR=/data
      # Optional: provide your own strong secret. If left unset, the server
      # auto-generates one and persists it in the /data volume on first run.
      - JWT_SECRET=${JWT_SECRET:-}
      # ── Optional: TrueNAS SCALE ───────────────────────────────
      # - TRUENAS_URL=http://your-truenas-ip
      # - TRUENAS_API_KEY=your-truenas-api-key
      # ── Optional: Media Server (Plex or Jellyfin) ─────────────
      # - MEDIA_SERVER_TYPE=jellyfin   # or "plex"
      # - MEDIA_SERVER_URL=http://your-media-server:8096
      # - MEDIA_SERVER_API_KEY=your-api-key
      # ── Optional: Sonarr ──────────────────────────────────────
      # - SONARR_URL=http://your-sonarr:8989
      # - SONARR_API_KEY=your-sonarr-api-key
      # ── Optional: Radarr ──────────────────────────────────────
      # - RADARR_URL=http://your-radarr:7878
      # - RADARR_API_KEY=your-radarr-api-key
      # ── Optional: qBittorrent ─────────────────────────────────
      # - QBITTORRENT_URL=http://your-qbittorrent:8080
      # - QBITTORRENT_USERNAME=admin
      # - QBITTORRENT_PASSWORD=your-qbittorrent-password
      # ── Optional: Pi-hole ─────────────────────────────────────
      # - PIHOLE_URL=http://your-pihole
      # - PIHOLE_API_KEY=your-pihole-api-token
      # ── Optional: Nginx Proxy Manager ─────────────────────────
      # NPM_URL must point at the ADMIN/API port (81 by default),
      # NOT the proxied site on 80/443.
      # - NPM_URL=http://your-npm-host:81
      # - NPM_EMAIL=admin@example.com
      # - NPM_PASSWORD=your-npm-admin-password
    volumes:
      # SQLite database file and uploaded images persist here
      - homelab-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homelab-data:
    driver: local
