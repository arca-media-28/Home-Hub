openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HomeHub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: tiles
    description: Dashboard tiles
  - name: uploads
    description: Image uploads
  - name: widgets
    description: Live data widgets
  - name: connections
    description: Service connection settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tiles:
    get:
      operationId: getTiles
      tags: [tiles]
      summary: List tiles for the authenticated user (optionally scoped to a page)
      security:
        - bearerAuth: []
      parameters:
        - name: pageId
          in: query
          required: false
          description: >-
            When provided, return only the tiles belonging to this page.
            Omitting it returns every tile the user owns.
          schema:
            type: integer
      responses:
        "200":
          description: Tile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tile"
    post:
      operationId: createTile
      tags: [tiles]
      summary: Create a new tile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tile"

  /tiles/{id}:
    get:
      operationId: getTile
      tags: [tiles]
      summary: Get a single tile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTile
      tags: [tiles]
      summary: Update a tile's config or position
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TileUpdate"
      responses:
        "200":
          description: Updated tile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tile"
    delete:
      operationId: deleteTile
      tags: [tiles]
      summary: Delete a tile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tiles/layout:
    put:
      operationId: saveLayout
      tags: [tiles]
      summary: Bulk-save tile layout (positions and sizes)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LayoutUpdate"
      responses:
        "200":
          description: Updated tiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tile"

  /pages:
    get:
      operationId: getPages
      tags: [pages]
      summary: List the authenticated user's dashboard pages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Page list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Page"
    post:
      operationId: createPage
      tags: [pages]
      summary: Create a new dashboard page
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"

  /pages/reorder:
    put:
      operationId: reorderPages
      tags: [pages]
      summary: Persist a new page display order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageReorder"
      responses:
        "200":
          description: Reordered page list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Page"

  /pages/{id}:
    put:
      operationId: updatePage
      tags: [pages]
      summary: Rename a dashboard page
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageInput"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePage
      tags: [pages]
      summary: Delete a dashboard page and its tiles
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Cannot delete the last remaining page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uploads:
    get:
      operationId: listUploads
      tags: [uploads]
      summary: List the authenticated user's uploaded images
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Uploaded image list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadedFile"

  /uploads/{id}:
    delete:
      operationId: deleteUpload
      tags: [uploads]
      summary: Delete an uploaded image from the library
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/truenas:
    get:
      operationId: getTruenasMetrics
      tags: [widgets]
      summary: Get TrueNAS system metrics (CPU, RAM, ZFS pools)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: TrueNAS metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TruenasMetrics"

  /widgets/media:
    get:
      operationId: getMediaRecent
      tags: [widgets]
      summary: Get recently added media from Plex or Jellyfin
      security:
        - bearerAuth: []
      parameters:
        - name: server
          in: query
          required: false
          description: >-
            Which media server the tile is backed by. "plex" resolves the saved
            Plex connection; "jellyfin" resolves the saved Jellyfin connection.
            Defaults to "plex" when omitted.
          schema:
            type: string
            enum: [plex, jellyfin]
      responses:
        "200":
          description: Recent media items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaItem"

  /widgets/media/continue:
    get:
      operationId: getMediaContinue
      tags: [widgets]
      summary: Get in-progress / on-deck media to continue watching from Plex or Jellyfin
      security:
        - bearerAuth: []
      parameters:
        - name: server
          in: query
          required: false
          description: >-
            Which media server the tile is backed by. "plex" resolves the saved
            Plex connection (On Deck); "jellyfin" resolves the saved Jellyfin
            connection (Resume items). Defaults to "plex" when omitted.
          schema:
            type: string
            enum: [plex, jellyfin]
      responses:
        "200":
          description: Continue watching items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContinueWatchingItem"

  /widgets/sonarr:
    get:
      operationId: getSonarrQueue
      tags: [widgets]
      summary: Get upcoming shows or active download queue from Sonarr
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sonarr queue/calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SonarrData"

  /widgets/radarr:
    get:
      operationId: getRadarrQueue
      tags: [widgets]
      summary: Get upcoming movie releases or active download queue from Radarr
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Radarr queue/calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarrData"

  /widgets/lidarr:
    get:
      operationId: getLidarrQueue
      tags: [widgets]
      summary: Get upcoming album releases or active download queue from Lidarr
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lidarr queue/calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LidarrData"

  /widgets/qbittorrent:
    get:
      operationId: getQbittorrentStatus
      tags: [widgets]
      summary: Get active torrents and global transfer stats from qBittorrent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: qBittorrent torrents/transfer stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QbittorrentData"

  /widgets/pihole:
    get:
      operationId: getPiholeMetrics
      tags: [widgets]
      summary: Get DNS query/ad-block summary stats from Pi-hole
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pi-hole DNS stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PiholeData"

  /widgets/nginx-proxy-manager:
    get:
      operationId: getNginxProxyManagerData
      tags: [widgets]
      summary: Get proxy host, dead host, and SSL certificate summary from Nginx Proxy Manager
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Nginx Proxy Manager summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NginxProxyManagerData"

  /widgets/prowlarr:
    get:
      operationId: getProwlarrWidget
      tags: [widgets]
      summary: Get indexer status, recent grab count, and health warnings from Prowlarr
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Prowlarr indexer status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProwlarrData"

  /widgets/tailscale:
    get:
      operationId: getTailscaleStatus
      tags: [widgets]
      summary: Get tailnet device status (online/offline counts and per-device list) from Tailscale
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tailscale tailnet status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TailscaleData"

  /widgets/ersatztv:
    get:
      operationId: getErsatzTvWidget
      tags: [widgets]
      summary: Get live status (reachability, active streams, and per-channel now playing) from ErsatzTV
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ErsatzTV live status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErsatzTvData"

  /widgets/audioplayer:
    get:
      operationId: getAudioPlayerNowPlaying
      tags: [widgets]
      summary: Get the current/last music track and a playable queue for the Audio Player tile
      security:
        - bearerAuth: []
      parameters:
        - name: source
          in: query
          required: false
          description: >-
            Which music source backs the tile. "plex" resolves the saved Plex
            connection, "jellyfin" the saved Jellyfin connection, and "subsonic"
            the saved Navidrome / Subsonic connection; each returns its
            current/last music session plus a browser-playable queue. "spotify"
            uses the linked Spotify account. Defaults to "plex" when omitted.
          schema:
            type: string
            enum: [plex, spotify, jellyfin, subsonic]
      responses:
        "200":
          description: Now-playing track and queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioPlayerData"
        "502":
          description: The configured music source could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/audioplayer/search:
    get:
      operationId: searchAudioLibrary
      tags: [widgets]
      summary: Search a music source's library for artists, albums, and tracks
      security:
        - bearerAuth: []
      parameters:
        - name: source
          in: query
          required: false
          description: >-
            Which music source to search. "plex" resolves the saved Plex
            connection; "subsonic" the saved Navidrome / Subsonic connection.
            Defaults to "plex" when omitted.
          schema:
            type: string
            enum: [plex, subsonic]
        - name: query
          in: query
          required: true
          description: The text to match against artist, album, and track names.
          schema:
            type: string
      responses:
        "200":
          description: Search results grouped into artists, albums, and tracks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioBrowseResult"
        "502":
          description: The configured music source could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/audioplayer/browse:
    get:
      operationId: browseAudioLibrary
      tags: [widgets]
      summary: Browse a music source's library and playlists (with drill-down)
      security:
        - bearerAuth: []
      parameters:
        - name: source
          in: query
          required: false
          description: >-
            Which music source to browse. "plex" or "subsonic". Defaults to
            "plex" when omitted.
          schema:
            type: string
            enum: [plex, subsonic]
        - name: kind
          in: query
          required: true
          description: >-
            What to list. "recent" = recently added albums, "albums" = all
            albums, "artists" = all artists, "playlists" = all playlists,
            "random" = a flat list of ~20 random playable tracks. The
            drill-down kinds require an id: "artist" returns that artist's
            albums, "album" returns that album's tracks, "playlist" returns
            that playlist's tracks.
          schema:
            type: string
            enum: [recent, albums, artists, artist, album, playlists, playlist, random]
        - name: id
          in: query
          required: false
          description: >-
            The container id to drill into. Required for kind=artist,
            kind=album, and kind=playlist; ignored for the top-level listings.
          schema:
            type: string
      responses:
        "200":
          description: The requested browse listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioBrowseResult"
        "400":
          description: A drill-down kind was requested without the required id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The configured music source could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/subsonic/scrobble:
    post:
      operationId: scrobbleSubsonic
      tags: [widgets]
      summary: >-
        Report a Subsonic/Navidrome play to the server so the dashboard appears
        as a real session (now-playing + play counts) to other clients
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubsonicScrobbleInput"
      responses:
        "200":
          description: The scrobble was accepted by the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsonicScrobbleResult"
        "400":
          description: Missing or invalid track id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No Subsonic / Navidrome connection is configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The Subsonic server could not be reached or rejected the scrobble
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/news:
    get:
      operationId: getNewsWidget
      tags: [widgets]
      summary: Fetch and parse recent headlines from an RSS/Atom feed URL
      security:
        - bearerAuth: []
      parameters:
        - name: url
          in: query
          required: false
          description: >-
            The RSS or Atom feed URL to fetch. When omitted, representative demo
            headlines are returned so an unconfigured tile still renders.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of headlines to return (clamped server-side).
          schema:
            type: integer
      responses:
        "200":
          description: Parsed feed headlines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsData"
        "502":
          description: The configured feed could not be fetched or parsed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/stocks:
    get:
      operationId: getStocksWidget
      tags: [widgets]
      summary: Get current price and daily change for a set of stock symbols
      security:
        - bearerAuth: []
      parameters:
        - name: symbols
          in: query
          required: false
          description: >-
            Comma-separated ticker symbols to quote (e.g. "AAPL,MSFT,VOO").
            When omitted or empty, representative demo quotes are returned so an
            unconfigured tile still renders.
          schema:
            type: string
      responses:
        "200":
          description: Quotes for the requested symbols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockData"
        "502":
          description: The configured stock-quote provider could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/stocks/candles:
    get:
      operationId: getStockCandles
      tags: [widgets]
      summary: Get recent daily closing prices (for inline sparklines) for symbols
      security:
        - bearerAuth: []
      parameters:
        - name: symbols
          in: query
          required: false
          description: >-
            Comma-separated ticker symbols to fetch recent daily closes for
            (e.g. "AAPL,MSFT,VOO"). When omitted or empty, representative demo
            series are returned so an unconfigured tile still renders.
          schema:
            type: string
      responses:
        "200":
          description: Recent closing-price series, one per resolved symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockCandlesData"
        "502":
          description: The configured stock-quote provider could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/stocks/search:
    get:
      operationId: searchStocks
      tags: [widgets]
      summary: Search for stock symbols by ticker or company name (for the tile editor)
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search text (ticker fragment or company name).
          schema:
            type: string
      responses:
        "200":
          description: Matching symbols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSearchData"
        "502":
          description: The configured stock-quote provider could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /connections:
    get:
      operationId: getConnections
      tags: [connections]
      summary: List saved service connection settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Service connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceConnection"

  /connections/status:
    get:
      operationId: getConnectionsStatus
      tags: [connections]
      summary: Report current reachability of every saved service connection
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Per-service reachability status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceStatus"

  /connections/health:
    get:
      operationId: getConnectionHealth
      tags: [connections]
      summary: Last-known health of each saved connection from the background scheduler
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection health snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionHealth"

  /connections/{service}/test:
    post:
      operationId: testConnection
      tags: [connections]
      summary: Test a service connection using the supplied values without saving
      security:
        - bearerAuth: []
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
            enum: [truenas, plex, jellyfin, subsonic, sonarr, radarr, lidarr, qbittorrent, pihole, nginx-proxy-manager, prowlarr, tailscale, ersatztv, stocks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceConnectionUpdate"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /connections/{service}:
    put:
      operationId: updateConnection
      tags: [connections]
      summary: Save connection settings for a single service
      security:
        - bearerAuth: []
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
            enum: [truenas, plex, jellyfin, subsonic, sonarr, radarr, lidarr, qbittorrent, pihole, nginx-proxy-manager, prowlarr, tailscale, ersatztv, stocks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceConnectionUpdate"
      responses:
        "200":
          description: Updated connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceConnection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /connections/spotify/credentials:
    post:
      operationId: saveSpotifyCredentials
      tags: [connections]
      summary: Save the Spotify app Client ID and Client Secret used for OAuth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyCredentialsInput"
      responses:
        "200":
          description: Updated Spotify link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyStatus"

  /connections/spotify/status:
    get:
      operationId: getSpotifyStatus
      tags: [connections]
      summary: Report whether Spotify is configured and a user account is linked
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Spotify link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyStatus"

  /connections/spotify/authorize:
    post:
      operationId: startSpotifyAuth
      tags: [connections]
      summary: Begin the Spotify OAuth flow and return the authorize URL to visit
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyAuthInput"
      responses:
        "200":
          description: The Spotify authorize URL the browser should navigate to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyAuthUrl"
        "400":
          description: Spotify credentials are not configured yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /connections/spotify/disconnect:
    post:
      operationId: disconnectSpotify
      tags: [connections]
      summary: Unlink the Spotify account (clears stored OAuth tokens)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated Spotify link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyStatus"

  /connections/spotify/token:
    get:
      operationId: getSpotifyToken
      tags: [connections]
      summary: Get a fresh Spotify access token for the Web Playback SDK
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A short-lived access token, or null when not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyToken"

  /widgets/spotify/command:
    post:
      operationId: sendSpotifyCommand
      tags: [widgets]
      summary: Remote-control the active Spotify device (play/pause/skip/transfer)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotifyCommandInput"
      responses:
        "200":
          description: The command was accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyCommandResult"
        "404":
          description: No active Spotify device to control
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Spotify could not be reached or rejected the command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AuthCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
        username:
          type: string

    Tile:
      type: object
      required: [id, userId, type, gridX, gridY, gridW, gridH]
      properties:
        id:
          type: integer
        userId:
          type: integer
        pageId:
          description: >-
            The page this tile belongs to. Null only for tiles that predate the
            multi-page migration and could not be assigned a page.
          type: ["integer", "null"]
        type:
          type: string
          enum: [app, truenas, media, sonarr, radarr, lidarr, qbittorrent]
        integration:
          type: ["string", "null"]
          enum: [truenas, media, jellyfin, sonarr, radarr, lidarr, qbittorrent, pihole, nginx-proxy-manager, prowlarr, tailscale, ersatztv, audioplayer, clock, timer, weather, sports, news, stocks, sleeper, note, spacer, divider, null]
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer
        name:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
        bgColor:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        imageFit:
          type: ["string", "null"]
          enum: ["cover", "contain", "none", "center", "top-left", null]
        imagePosition:
          description: >-
            How the image is positioned within the tile. Newer tiles store a free
            drag-set pan as "pan(<x>,<y>)" — a CSS translate in percent of the
            tile box (e.g. "pan(-12.5,30)"), which works on both axes at any zoom.
            Legacy values are also honored: a named anchor key (e.g. "center",
            "top-left") or a focal point as a CSS object-position "<x>% <y>%".
            Null falls back to the legacy imageFit behavior.
          type: ["string", "null"]
        imageScale:
          description: >-
            Zoom percentage applied to the image (100 = native). Null means no
            scaling.
          type: ["integer", "null"]
        titleSize:
          description: >-
            Size key for the tile title on plain app/link tiles (e.g. "sm",
            "md", "lg", "xl"). Null means the default. Ignored by integration
            (widget) tiles.
          type: ["string", "null"]
        titlePosition:
          description: >-
            Anchor key for where the tile title sits on plain app/link tiles
            (e.g. "center", "top-left"). Null means the default. Ignored by
            integration (widget) tiles.
          type: ["string", "null"]
        titleColor:
          description: >-
            CSS color for the tile title text on plain app/link tiles. Null
            means the default (white over an image, theme color otherwise).
            Ignored by integration (widget) tiles.
          type: ["string", "null"]
        hideTitle:
          description: >-
            When true, the tile renders without its title text (image/widget
            content only). Defaults to false (title shown). Applies to both
            plain app/link tiles and integration (widget) tiles.
          type: boolean
        metrics:
          description: >-
            Enabled metric keys for this tile's integration. Null means "show
            all" (the default for tiles created before metric selection existed).
          type: ["array", "null"]
          items:
            type: string
        tileSettings:
          $ref: "#/components/schemas/TileSettings"
        createdAt:
          type: string

    TileInput:
      type: object
      required: [type, gridX, gridY, gridW, gridH]
      properties:
        pageId:
          description: >-
            The page to create this tile on. Omit to fall back to the user's
            first page.
          type: ["integer", "null"]
        type:
          type: string
          enum: [app, truenas, media, sonarr, radarr, lidarr, qbittorrent]
        integration:
          type: ["string", "null"]
          enum: [truenas, media, jellyfin, sonarr, radarr, lidarr, qbittorrent, pihole, nginx-proxy-manager, prowlarr, tailscale, ersatztv, audioplayer, clock, timer, weather, sports, news, stocks, sleeper, note, spacer, divider, null]
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer
        name:
          type: string
        url:
          type: string
        bgColor:
          type: ["string", "null"]
        imageUrl:
          type: string
        imageFit:
          type: string
        imagePosition:
          type: string
        imageScale:
          type: integer
        titleSize:
          type: ["string", "null"]
        titlePosition:
          type: ["string", "null"]
        titleColor:
          type: ["string", "null"]
        hideTitle:
          type: boolean
        metrics:
          type: ["array", "null"]
          items:
            type: string
        tileSettings:
          $ref: "#/components/schemas/TileSettings"

    TileUpdate:
      type: object
      properties:
        integration:
          type: ["string", "null"]
          enum: [truenas, media, jellyfin, sonarr, radarr, lidarr, qbittorrent, pihole, nginx-proxy-manager, prowlarr, tailscale, ersatztv, audioplayer, clock, timer, weather, sports, news, stocks, sleeper, note, spacer, divider, null]
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer
        name:
          type: string
        url:
          type: string
        bgColor:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        imageFit:
          type: string
        imagePosition:
          type: ["string", "null"]
        imageScale:
          type: ["integer", "null"]
        titleSize:
          type: ["string", "null"]
        titlePosition:
          type: ["string", "null"]
        titleColor:
          type: ["string", "null"]
        hideTitle:
          type: boolean
        metrics:
          type: ["array", "null"]
          items:
            type: string
        tileSettings:
          $ref: "#/components/schemas/TileSettings"

    TileSettings:
      description: >-
        Per-tile extra configuration for integration widgets. Null means no
        extra settings (the default). Carries the qBittorrent category filter,
        the Local Time clock options, the Weather tile options, and the Sports
        tile options.
      type: ["object", "null"]
      properties:
        categoryFilter:
          description: >-
            Allow-list of qBittorrent categories to show on the tile. Null (or
            absent) means show all categories.
          type: ["array", "null"]
          items:
            type: string
        groupByCategory:
          description: >-
            When true, the qBittorrent tile groups its torrents under category
            headers instead of showing a flat list. Absent or false means a
            flat list (the default).
          type: ["boolean", "null"]
        clockFormat:
          description: >-
            Time format for the Local Time tile: "12" for 12-hour with AM/PM,
            "24" for 24-hour. Absent or null defaults to "24".
          type: ["string", "null"]
          enum: ["12", "24", null]
        clockShowSeconds:
          description: >-
            When true, the Local Time tile shows seconds. Absent or false hides
            them (the default).
          type: ["boolean", "null"]
        clockShowDate:
          description: >-
            When true, the Local Time tile shows the current date. Absent or
            false hides it (the default).
          type: ["boolean", "null"]
        weatherAutoLocate:
          description: >-
            When true, the Weather tile auto-detects the user's location via the
            browser. Absent or true defaults to auto-detect; false uses the
            typed weatherLocation instead.
          type: ["boolean", "null"]
        weatherLocation:
          description: >-
            City/place name to geocode for the Weather tile when auto-detect is
            off (or as a fallback). Null or absent means none set.
          type: ["string", "null"]
        weatherUnits:
          description: >-
            Temperature units for the Weather tile: "c" for Celsius, "f" for
            Fahrenheit. Absent or null defaults to "c".
          type: ["string", "null"]
          enum: ["c", "f", null]
        sportsLeagues:
          description: >-
            League keys the Sports tile follows (e.g. "nfl", "nba", "eng.1").
            Null or absent means none selected yet (the tile shows an empty
            state until at least one league is chosen).
          type: ["array", "null"]
          items:
            type: string
        sportsTeams:
          description: >-
            Optional team allow-list for the Sports tile, scoped per league as
            "<leagueKey>:<teamId>" (e.g. "nfl:12"). When a league has no entries
            here, all of its teams are shown. Null or absent means no team
            filtering (all teams in every selected league).
          type: ["array", "null"]
          items:
            type: string
        sportsShowScores:
          description: >-
            When true, the Sports tile shows live/recent scores. Absent or null
            defaults to true. At least one of sportsShowScores / sportsShowNews
            must be on.
          type: ["boolean", "null"]
        sportsShowNews:
          description: >-
            When true, the Sports tile shows the latest headlines. Absent or
            null defaults to false. At least one of sportsShowScores /
            sportsShowNews must be on.
          type: ["boolean", "null"]
        newsFeedUrl:
          description: >-
            RSS or Atom feed URL the News tile pulls headlines from. Null or
            absent means none set, in which case the tile shows demo headlines.
          type: ["string", "null"]
        newsMaxItems:
          description: >-
            Maximum number of headlines the News tile requests/shows. Null or
            absent defaults to a sensible value (clamped server-side).
          type: ["integer", "null"]
        newsShowTimestamp:
          description: >-
            When true, the News tile shows each headline's published time (as
            room allows). Absent or false hides it (the default).
          type: ["boolean", "null"]
        stockWatchlist:
          description: >-
            Per-tile watchlist of stock symbols for the Stocks tile. Each entry
            carries an uppercased ticker symbol and optional share quantity and
            average cost basis per share, which turn the watchlist into a
            lightweight portfolio. Null or absent means none set (the tile shows
            demo/sample quotes).
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/StockWatchEntry"
        sleeperUsername:
          description: >-
            Sleeper account username the Fantasy tile follows. Used to resolve
            the user's id and locate their roster in the league. Null or absent
            means none set (the tile shows an empty state until configured).
          type: ["string", "null"]
        sleeperLeagueId:
          description: >-
            Sleeper league id the Fantasy tile shows. Sleeper's read endpoints
            are public for any league id. Null or absent means none chosen yet.
          type: ["string", "null"]
        sleeperSport:
          description: >-
            Sport the Fantasy tile's league belongs to (e.g. "nfl", "nba").
            Absent or null defaults to "nfl".
          type: ["string", "null"]
        sleeperSeason:
          description: >-
            Season year the Fantasy tile's league belongs to (e.g. "2025").
            Absent or null defaults to the current NFL season.
          type: ["string", "null"]
        sleeperShowMatchup:
          description: >-
            When true, the Fantasy tile shows the user's current-week matchup.
            Absent or null defaults to true.
          type: ["boolean", "null"]
        sleeperShowStandings:
          description: >-
            When true, the Fantasy tile shows the league standings. Absent or
            null defaults to true.
          type: ["boolean", "null"]
        sleeperShowTransactions:
          description: >-
            When true, the Fantasy tile shows recent waiver/trade transactions.
            Absent or null defaults to true.
          type: ["boolean", "null"]
        audioSource:
          description: >-
            Which music source backs an Audio Player tile (e.g. "plex"). Absent
            or null defaults to "plex". This is the seam additional sources
            (Spotify, Jellyfin, Navidrome) plug into later.
          type: ["string", "null"]
        audioFindMusic:
          description: >-
            When true, the Audio Player tile shows the "Find music" button that
            opens the music browser (Plex / Subsonic only). Absent or null
            defaults to true.
          type: ["boolean", "null"]
        audioSearch:
          description: >-
            When true, the Audio Player tile's music browser offers the Search
            tab (Plex / Subsonic only). Absent or null defaults to true.
          type: ["boolean", "null"]
        audioBrowse:
          description: >-
            When true, the Audio Player tile's music browser offers the Browse
            tab (recently added / albums / artists, Plex / Subsonic only).
            Absent or null defaults to true.
          type: ["boolean", "null"]
        audioPlaylists:
          description: >-
            When true, the Audio Player tile's music browser offers the
            Playlists tab (Plex / Subsonic only). Absent or null defaults to
            true.
          type: ["boolean", "null"]
        scrollable:
          description: >-
            When true, the tile body shows a scrollbar when its content
            overflows instead of clipping it at the tile edge. Absent or false
            clips overflowing content (the default).
          type: ["boolean", "null"]
        noteBody:
          description: >-
            Free-form note text for a Note (post-it) tile. Null or absent means
            an empty note.
          type: ["string", "null"]
        noteItems:
          description: >-
            Checklist / to-do items for a Note tile. Each item has text and a
            done flag (rendered with a strike-through when done). Null or absent
            means no checklist.
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/NoteChecklistItem"
        noteColor:
          description: >-
            Background color of a Note (post-it) tile as a CSS color string
            (e.g. a preset note color or a custom hex). Null or absent uses the
            default post-it yellow.
          type: ["string", "null"]
        noteFontSize:
          description: >-
            Font size for a Note tile's text: "sm", "md", or "lg". Absent or
            null defaults to "md".
          type: ["string", "null"]
          enum: ["sm", "md", "lg", null]
        noteTextColor:
          description: >-
            CSS color for a Note tile's text (note body and checklist). Null or
            absent uses a sensible dark default that reads on light post-it
            colors.
          type: ["string", "null"]
        timerMode:
          description: >-
            Mode for a Timer tile: "countup" for a stopwatch counting elapsed
            time from zero, "countdown" for counting down from timerDuration to
            zero, "pomodoro" for an auto-cycling focus/break timer. Absent or
            null defaults to "countup".
          type: ["string", "null"]
          enum: ["countup", "countdown", "pomodoro", null]
        timerDuration:
          description: >-
            Starting duration in seconds for a countdown Timer tile. Ignored in
            count-up mode. Null or absent defaults to a sensible value.
          type: ["integer", "null"]
        timerRunning:
          description: >-
            Whether a Timer tile is currently running. When true the live
            display advances from timerStartedAt; when false it is paused at
            timerAccumulatedMs. Absent or false means paused (the default).
          type: ["boolean", "null"]
        timerStartedAt:
          description: >-
            Epoch milliseconds when the Timer tile's current run segment began.
            Combined with timerAccumulatedMs this lets the live display resume
            accurately after a refresh or page navigation. Null or absent when
            the timer is paused.
          type: ["integer", "null"]
        timerAccumulatedMs:
          description: >-
            Elapsed milliseconds accumulated across previous run segments of a
            Timer tile (i.e. before timerStartedAt). Null or absent means zero.
          type: ["integer", "null"]
        pomodoroFocusMinutes:
          description: >-
            Length in minutes of a focus interval for a Timer tile in pomodoro
            mode. Null or absent defaults to 25.
          type: ["integer", "null"]
        pomodoroShortBreakMinutes:
          description: >-
            Length in minutes of a short break for a Timer tile in pomodoro
            mode. Null or absent defaults to 5.
          type: ["integer", "null"]
        pomodoroLongBreakMinutes:
          description: >-
            Length in minutes of the long break for a Timer tile in pomodoro
            mode. Null or absent defaults to 15.
          type: ["integer", "null"]
        pomodoroSessionsBeforeLongBreak:
          description: >-
            How many focus sessions complete before a Timer tile in pomodoro
            mode runs a long break. Null or absent defaults to 4.
          type: ["integer", "null"]
        pomodoroPhase:
          description: >-
            Current phase of a Timer tile in pomodoro mode: "focus", a
            "shortBreak", or the "longBreak". Combined with the anchor timestamp
            this lets the live display resume the correct phase after a refresh
            or page navigation. Null or absent defaults to "focus".
          type: ["string", "null"]
          enum: ["focus", "shortBreak", "longBreak", null]
        pomodoroCompletedSessions:
          description: >-
            Number of focus sessions completed in the current pomodoro cycle for
            a Timer tile (resets to zero after a long break). Null or absent
            means zero.
          type: ["integer", "null"]
        timerAlertEnabled:
          description: >-
            Whether a countdown Timer tile plays a chime and fires a browser
            notification when it reaches zero. Null or absent means disabled.
          type: ["boolean", "null"]

    NoteChecklistItem:
      type: object
      required: [text, done]
      properties:
        text:
          description: The checklist item's label text.
          type: string
        done:
          description: >-
            Whether the item is checked off. When true the tile renders it with
            a strike-through.
          type: boolean

    StockWatchEntry:
      type: object
      required: [symbol]
      properties:
        symbol:
          description: Ticker symbol (e.g. "AAPL"), stored uppercased.
          type: string
        shares:
          description: >-
            Optional number of shares held. When present (and > 0) the tile
            shows this row's position value and gain/loss.
          type: ["number", "null"]
        costBasis:
          description: >-
            Optional average cost per share. Used with shares to compute
            gain/loss. Null or absent when not tracking cost.
          type: ["number", "null"]

    StockQuote:
      type: object
      required: [symbol, price, change, changePercent]
      properties:
        symbol:
          description: The ticker symbol this quote is for (uppercased).
          type: string
        name:
          description: >-
            Human-readable company/ETF name when available. Null when the
            provider does not return one.
          type: ["string", "null"]
        price:
          description: Latest/current price.
          type: number
        change:
          description: Absolute price change since the previous close.
          type: number
        changePercent:
          description: Percent price change since the previous close.
          type: number

    StockData:
      type: object
      required: [quotes, sample]
      properties:
        quotes:
          description: One quote per requested symbol that resolved successfully.
          type: array
          items:
            $ref: "#/components/schemas/StockQuote"
        sample:
          description: >-
            True when the quotes are built-in sample data (no provider API key
            configured), so the tile can label them as not-live.
          type: boolean

    StockSearchResult:
      type: object
      required: [symbol, description]
      properties:
        symbol:
          description: Ticker symbol to add to a watchlist.
          type: string
        description:
          description: Company/ETF name or description for the symbol.
          type: string

    StockSearchData:
      type: object
      required: [results, sample]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/StockSearchResult"
        sample:
          description: >-
            True when the results are built-in sample matches (no provider API
            key configured).
          type: boolean

    StockCandleSeries:
      type: object
      required: [symbol, closes]
      properties:
        symbol:
          description: The ticker symbol this series is for (uppercased).
          type: string
        closes:
          description: >-
            Recent daily closing prices in chronological order (oldest first),
            suitable for rendering an inline sparkline.
          type: array
          items:
            type: number

    StockCandlesData:
      type: object
      required: [series, sample]
      properties:
        series:
          description: One closing-price series per requested symbol that resolved.
          type: array
          items:
            $ref: "#/components/schemas/StockCandleSeries"
        sample:
          description: >-
            True when the series are built-in sample data (no provider API key
            configured), so the tile can label them as not-live.
          type: boolean

    LayoutItem:
      type: object
      required: [id, gridX, gridY, gridW, gridH]
      properties:
        id:
          type: integer
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer

    LayoutUpdate:
      type: object
      required: [tiles]
      properties:
        pageId:
          description: >-
            The page whose layout is being saved. When provided, the response
            returns only that page's tiles; omit for all of the user's tiles.
          type: ["integer", "null"]
        tiles:
          type: array
          items:
            $ref: "#/components/schemas/LayoutItem"

    Page:
      type: object
      required: [id, userId, name, position]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        position:
          type: integer
        createdAt:
          type: string

    PageInput:
      type: object
      properties:
        name:
          type: string

    PageReorder:
      type: object
      required: [order]
      properties:
        order:
          description: Page ids in the desired display order.
          type: array
          items:
            type: integer

    UploadResult:
      type: object
      required: [url]
      properties:
        url:
          type: string

    UploadedFile:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
        url:
          type: string
        originalName:
          type: ["string", "null"]
        mimetype:
          type: ["string", "null"]
        size:
          type: ["integer", "null"]
        createdAt:
          type: ["string", "null"]

    ServiceConnection:
      type: object
      required: [service]
      properties:
        service:
          type: string
        url:
          type: ["string", "null"]
        apiKey:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        password:
          type: ["string", "null"]
        token:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]

    ServiceConnectionUpdate:
      type: object
      properties:
        url:
          type: string
        apiKey:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string

    ConnectionTestResult:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    SpotifyCredentialsInput:
      type: object
      required: [clientId, clientSecret]
      properties:
        clientId:
          description: The Spotify application's Client ID.
          type: string
        clientSecret:
          description: The Spotify application's Client Secret.
          type: string

    SpotifyStatus:
      type: object
      required: [configured, connected, redirectUri]
      properties:
        configured:
          description: True once a Client ID and Client Secret have been saved.
          type: boolean
        connected:
          description: True once a Spotify user account has been linked via OAuth.
          type: boolean
        premium:
          description: >-
            Whether the linked account is Spotify Premium (required for
            in-browser Web Playback SDK streaming). Null when not connected.
          type: ["boolean", "null"]
        displayName:
          description: The linked Spotify account's display name. Null when not connected.
          type: ["string", "null"]
        redirectUri:
          description: >-
            The exact OAuth redirect URI the user must add to their Spotify app's
            allow-list. Derived from the request origin.
          type: string

    SpotifyAuthInput:
      type: object
      required: [origin]
      properties:
        origin:
          description: >-
            The dashboard's browser origin (e.g. "https://example.repl.co"), used
            to build the OAuth redirect URI that points back at this server.
          type: string

    SpotifyAuthUrl:
      type: object
      required: [url]
      properties:
        url:
          description: The Spotify accounts authorize URL the browser should navigate to.
          type: string

    SpotifyToken:
      type: object
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          description: A short-lived Spotify access token, or null when not linked.
          type: ["string", "null"]
        expiresAt:
          description: Unix epoch (ms) at which the access token expires. Null when not linked.
          type: ["number", "null"]

    SpotifyCommandInput:
      type: object
      required: [action]
      properties:
        action:
          description: >-
            The remote-control action to perform on the active Spotify device.
            "transfer" moves playback to the given deviceId (used to start
            in-browser Web Playback SDK streaming).
          type: string
          enum: [play, pause, next, previous, transfer]
        deviceId:
          description: Target device id, required for "transfer".
          type: ["string", "null"]

    SpotifyCommandResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    SubsonicScrobbleInput:
      type: object
      required: [id]
      properties:
        id:
          description: The Subsonic song id the dashboard is/was streaming.
          type: string
          minLength: 1
        submission:
          description: >-
            false (default) registers a "now playing" ping that refreshes the
            dashboard's live session without incrementing play counts; true
            registers a completed play (a real scrobble) and bumps play counts.
          type: boolean

    SubsonicScrobbleResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    ServiceStatus:
      type: object
      required: [service, configured, ok, message]
      properties:
        service:
          type: string
        configured:
          type: boolean
        ok:
          type: boolean
        message:
          type: string

    ConnectionHealth:
      type: object
      required: [service, ok, message, checkedAt]
      properties:
        service:
          type: string
        ok:
          type: boolean
        message:
          type: string
        checkedAt:
          type: string

    TruenasMetrics:
      type: object
      required: [cpuPercent, memUsedGb, memTotalGb, pools, disks]
      properties:
        cpuPercent:
          type: number
        memUsedGb:
          type: number
        memTotalGb:
          type: number
        netInMbps:
          description: Inbound network throughput in megabits/sec; null when the reporting graph is unavailable.
          type: ["number", "null"]
        netOutMbps:
          description: Outbound network throughput in megabits/sec; null when the reporting graph is unavailable.
          type: ["number", "null"]
        arcHitRatio:
          description: ZFS ARC hit ratio as a percentage (0-100); null when the reporting graph is unavailable.
          type: ["number", "null"]
        arcSizeGb:
          description: ZFS ARC size in gigabytes; null when the reporting graph is unavailable.
          type: ["number", "null"]
        netInSeries:
          description: >-
            Recent inbound throughput samples (Mbps), oldest first, for an inline
            sparkline. Empty when the reporting graph is unavailable.
          type: array
          items:
            type: number
        netOutSeries:
          description: >-
            Recent outbound throughput samples (Mbps), oldest first, for an inline
            sparkline. Empty when the reporting graph is unavailable.
          type: array
          items:
            type: number
        arcHitSeries:
          description: >-
            Recent ZFS ARC hit-ratio samples (percent, 0-100), oldest first, for
            an inline sparkline. Empty when the reporting graph is unavailable.
          type: array
          items:
            type: number
        pools:
          type: array
          items:
            $ref: "#/components/schemas/ZfsPool"
        disks:
          type: array
          items:
            $ref: "#/components/schemas/TruenasDisk"

    ZfsPool:
      type: object
      required: [name, status, usedBytes, totalBytes]
      properties:
        name:
          type: string
        status:
          type: string
        usedBytes:
          type: number
        totalBytes:
          type: number

    TruenasDisk:
      type: object
      required: [name, temperatureC, smartPassed]
      properties:
        name:
          type: string
        temperatureC:
          type: ["number", "null"]
        smartPassed:
          type: ["boolean", "null"]

    MediaItem:
      type: object
      required: [id, title, type]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        year:
          type: ["integer", "null"]
        thumb:
          type: ["string", "null"]
        addedAt:
          type: ["string", "null"]
        seriesName:
          type: ["string", "null"]
        seasonLabel:
          type: ["string", "null"]
        url:
          type: ["string", "null"]

    ContinueWatchingItem:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: ["string", "null"]
        seriesName:
          type: ["string", "null"]
        thumb:
          type: ["string", "null"]
        progress:
          type: ["number", "null"]
        url:
          type: ["string", "null"]

    SonarrData:
      type: object
      required: [queue, upcoming]
      properties:
        queue:
          type: array
          items:
            $ref: "#/components/schemas/SonarrQueueItem"
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/SonarrUpcomingItem"

    SonarrQueueItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        progress:
          type: ["number", "null"]
        size:
          type: ["number", "null"]

    SonarrUpcomingItem:
      type: object
      required: [id, title, airDate]
      properties:
        id:
          type: integer
        title:
          type: string
        seriesTitle:
          type: string
        airDate:
          type: string
        seasonNumber:
          type: ["integer", "null"]
        episodeNumber:
          type: ["integer", "null"]

    RadarrData:
      type: object
      required: [queue, upcoming]
      properties:
        queue:
          type: array
          items:
            $ref: "#/components/schemas/RadarrQueueItem"
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/RadarrUpcomingItem"

    RadarrQueueItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        progress:
          type: ["number", "null"]
        size:
          type: ["number", "null"]

    RadarrUpcomingItem:
      type: object
      required: [id, title, releaseDate]
      properties:
        id:
          type: integer
        title:
          type: string
        releaseDate:
          type: string
        year:
          type: ["integer", "null"]

    LidarrData:
      type: object
      required: [queue, upcoming]
      properties:
        queue:
          type: array
          items:
            $ref: "#/components/schemas/LidarrQueueItem"
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/LidarrUpcomingItem"

    LidarrQueueItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        progress:
          type: ["number", "null"]
        size:
          type: ["number", "null"]

    LidarrUpcomingItem:
      type: object
      required: [id, title, releaseDate]
      properties:
        id:
          type: integer
        title:
          type: string
        artistName:
          type: string
        releaseDate:
          type: string

    QbittorrentData:
      type: object
      required: [torrents, downloadSpeed, uploadSpeed, categories]
      properties:
        torrents:
          type: array
          items:
            $ref: "#/components/schemas/QbittorrentTorrent"
        downloadSpeed:
          type: number
        uploadSpeed:
          type: number
        categories:
          description: >-
            All category names defined in qBittorrent, including categories
            that currently have no active torrents. Sourced from qBittorrent's
            dedicated categories endpoint so the tile filter can list every
            category even when nothing is downloading or seeding.
          type: array
          items:
            type: string

    QbittorrentTorrent:
      type: object
      required: [name, progress, state, dlSpeed, upSpeed, category]
      properties:
        name:
          type: string
        progress:
          type: number
        state:
          type: string
        dlSpeed:
          type: number
        upSpeed:
          type: number
        category:
          description: >-
            The qBittorrent category assigned to this torrent, or an empty
            string when uncategorized.
          type: string

    PiholeData:
      type: object
      required: [queriesTotal, adsBlocked, adsPercentage, domainsBlocked, status]
      properties:
        queriesTotal:
          type: number
        adsBlocked:
          type: number
        adsPercentage:
          type: number
        domainsBlocked:
          type: number
        status:
          type: string
          enum: [enabled, disabled]

    NginxProxyManagerData:
      type: object
      required: [total, enabled, offline, deadHostsCount, expiringCertsCount, proxyHosts]
      properties:
        total:
          description: Total number of configured proxy hosts.
          type: integer
        enabled:
          description: Number of enabled proxy hosts.
          type: integer
        offline:
          description: Number of enabled proxy hosts Nginx reports as offline.
          type: integer
        deadHostsCount:
          description: Number of 404 (dead) hosts configured.
          type: integer
        expiringCertsCount:
          description: Number of proxy hosts whose SSL certificate is expired or expiring soon.
          type: integer
        proxyHosts:
          type: array
          items:
            $ref: "#/components/schemas/NginxProxyHost"

    NginxProxyHost:
      type: object
      required: [id, domainNames, enabled, online, ssl, sslExpiring]
      properties:
        id:
          type: integer
        domainNames:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        online:
          type: boolean
        ssl:
          description: Whether the host has an SSL certificate attached.
          type: boolean
        sslExpiring:
          description: Whether the attached SSL certificate is expired or expiring soon.
          type: boolean

    ProwlarrData:
      type: object
      required: [indexers, grabCount24h, healthIssues]
      properties:
        indexers:
          type: array
          items:
            $ref: "#/components/schemas/ProwlarrIndexer"
        grabCount24h:
          description: Number of releases grabbed across all indexers in the last 24 hours.
          type: integer
        healthIssues:
          type: array
          items:
            $ref: "#/components/schemas/ProwlarrHealthIssue"

    ProwlarrIndexer:
      type: object
      required: [id, name, enabled, status]
      properties:
        id:
          type: integer
        name:
          type: string
        enabled:
          description: Whether the indexer is enabled in Prowlarr.
          type: boolean
        status:
          description: >-
            Reachability of an enabled indexer. "ok" when reachable; "failing"
            when Prowlarr reports it as unavailable due to recent failures.
            Disabled indexers report "ok" but render grey via the enabled flag.
          type: string
          enum: [ok, failing]

    ProwlarrHealthIssue:
      type: object
      required: [source, type, message]
      properties:
        source:
          type: string
        type:
          type: string
        message:
          type: string

    TailscaleData:
      type: object
      required: [tailnet, deviceCount, onlineCount, offlineCount, exitNodeCount, expiringSoonCount, devices]
      properties:
        tailnet:
          description: The tailnet name the devices belong to.
          type: string
        deviceCount:
          description: Total number of devices in the tailnet.
          type: integer
        onlineCount:
          description: Number of devices currently online.
          type: integer
        offlineCount:
          description: Number of devices currently offline.
          type: integer
        exitNodeCount:
          description: Number of online devices offering an approved exit node.
          type: integer
        expiringSoonCount:
          description: >-
            Number of devices whose node key is expiring soon (within the warning
            window) or has already lapsed.
          type: integer
        devices:
          type: array
          items:
            $ref: "#/components/schemas/TailscaleDevice"

    TailscaleDevice:
      type: object
      required: [id, name, os, online, exitNode, keyExpiryDisabled, keyExpiringSoon]
      properties:
        id:
          type: string
        name:
          description: The device's machine/host name.
          type: string
        os:
          description: The device's operating system (e.g. linux, macOS, iOS).
          type: string
        online:
          description: >-
            Whether the device is currently online, derived from how recently it
            was last seen.
          type: boolean
        lastSeen:
          description: ISO timestamp of when the device was last seen, when known.
          type: ["string", "null"]
        exitNode:
          description: >-
            Whether the device offers an approved exit node (advertises and is
            allowed to route the default 0.0.0.0/0 route).
          type: boolean
        addresses:
          description: >-
            The device's tailnet IP addresses (e.g. the 100.x.y.z CGNAT
            address and an IPv6 address), in the order Tailscale reports them.
          type: array
          items:
            type: string
        expires:
          description: >-
            ISO timestamp of when the device's node key expires, or null when key
            expiry is disabled or no expiry is set.
          type: ["string", "null"]
        keyExpiryDisabled:
          description: >-
            Whether key expiry has been disabled for this device (its node key
            never expires).
          type: boolean
        keyExpiringSoon:
          description: >-
            Whether the device's node key is expiring within the warning window
            (or has already lapsed). Always false when key expiry is disabled.
          type: boolean

    ErsatzTvData:
      type: object
      required: [reachable, channels]
      properties:
        reachable:
          description: >-
            Whether the ErsatzTV server is up and reachable. Always true in a
            200 response (a configured-but-unreachable server returns 502); the
            field lets the tile render the health metric uniformly.
          type: boolean
        activeStreams:
          description: >-
            Number of currently active streaming sessions, taken from ErsatzTV's
            /api/sessions endpoint (one entry per active transcode session).
            Null when that endpoint is unavailable (e.g. an older instance or a
            network error), in which case the tile omits the metric rather than
            failing.
          type: ["integer", "null"]
        channels:
          description: Channels and what each is currently airing (from the EPG).
          type: array
          items:
            $ref: "#/components/schemas/ErsatzTvChannel"

    ErsatzTvChannel:
      type: object
      required: [number, name, nowPlaying]
      properties:
        number:
          description: The channel number (e.g. "1", "2.1").
          type: string
        name:
          description: The channel's display name.
          type: string
        nowPlaying:
          description: >-
            Title of the programme currently airing on the channel (start ≤ now
            < stop in the EPG). Null when nothing is currently scheduled.
          type: ["string", "null"]

    AudioTrack:
      type: object
      required: [id, title]
      properties:
        id:
          description: Stable identifier for the track within its source.
          type: string
        title:
          description: The track title.
          type: string
        artist:
          description: Track artist (Plex grandparentTitle). Null when unknown.
          type: ["string", "null"]
        album:
          description: Album the track belongs to (Plex parentTitle). Null when unknown.
          type: ["string", "null"]
        artwork:
          description: >-
            Fully-qualified, authenticated album-art URL the browser can load
            directly (Plex token appended). Null when the source has no artwork.
          type: ["string", "null"]
        durationMs:
          description: Track length in milliseconds. Null when the source omits it.
          type: ["number", "null"]
        progressMs:
          description: >-
            Playback offset in milliseconds for the source's current session
            (Plex viewOffset). Only set on the now-playing track of an active
            remote session; null otherwise.
          type: ["number", "null"]
        state:
          description: >-
            Remote playback state reported by the source for an active session:
            "playing", "paused", or "stopped". Null when there is no active
            session (the track is a queue/last-played entry, not live).
          type: ["string", "null"]
        streamUrl:
          description: >-
            Fully-qualified, authenticated audio stream URL an HTML audio element
            can play directly (Plex part key + token). Null when the source does
            not expose an in-browser-playable stream (remote-control-only).
          type: ["string", "null"]

    AudioContainer:
      type: object
      required: [id, kind, title]
      properties:
        id:
          description: >-
            Stable identifier for the container within its source, used to drill
            into it via the browse endpoint.
          type: string
        kind:
          description: What this container is, so the client knows how to expand it.
          type: string
          enum: [artist, album, playlist]
        title:
          description: Display name of the artist, album, or playlist.
          type: string
        subtitle:
          description: >-
            Secondary line (album artist, track count, etc.). Null when none.
          type: ["string", "null"]
        artwork:
          description: >-
            Fully-qualified, authenticated cover-art URL the browser can load
            directly. Null when the source has no artwork.
          type: ["string", "null"]

    AudioBrowseResult:
      type: object
      required: [source, sample]
      properties:
        source:
          description: The music source backing this response ("plex" or "subsonic").
          type: string
        sample:
          description: >-
            True when the results are built-in demo content (the source is not
            configured); selecting them yields no real playback.
          type: boolean
        artists:
          description: >-
            Matching/listed artists (search results or a browse listing). Absent
            when not applicable to the request.
          type: array
          items:
            $ref: "#/components/schemas/AudioContainer"
        albums:
          description: >-
            Matching/listed albums (search results, a browse listing, or an
            artist's albums). Absent when not applicable to the request.
          type: array
          items:
            $ref: "#/components/schemas/AudioContainer"
        playlists:
          description: >-
            The source's playlists. Absent when not applicable to the request.
          type: array
          items:
            $ref: "#/components/schemas/AudioContainer"
        tracks:
          description: >-
            Playable tracks (search results, an album's tracks, or a playlist's
            tracks). Each carries a browser-playable streamUrl for the shared
            engine. Absent when not applicable to the request.
          type: array
          items:
            $ref: "#/components/schemas/AudioTrack"

    AudioPlayerData:
      type: object
      required: [source, sample, nowPlaying, queue]
      properties:
        source:
          description: The music source backing this response (e.g. "plex").
          type: string
        sample:
          description: >-
            True when the track(s) are built-in demo content (the source is not
            configured), so the tile can label playback as not-live and disable
            in-browser streaming.
          type: boolean
        nowPlaying:
          description: >-
            The source's current or last music track. For Plex this is the
            active music session when one exists, otherwise the most recently
            added/played track. Null when nothing is available.
          oneOf:
            - $ref: "#/components/schemas/AudioTrack"
            - type: "null"
        queue:
          description: >-
            Ordered list of browser-playable tracks the shared player can step
            through (skip next/previous). For Plex this is the now-playing
            track's album, or recent tracks when no session is active.
          type: array
          items:
            $ref: "#/components/schemas/AudioTrack"
        auth:
          description: >-
            Authorization state for sources that require OAuth (Spotify):
            "connected" when a valid linked account exists, "needed" when the
            user must link their account in Settings first. Null for sources
            that need no per-user OAuth (e.g. Plex).
          type: ["string", "null"]
          enum: ["connected", "needed", null]
        premium:
          description: >-
            Whether the linked account supports in-browser playback via the
            Spotify Web Playback SDK (Premium). True enables in-dashboard
            streaming; false degrades to remote control of an external device.
            Null when not applicable (non-OAuth sources or not connected).
          type: ["boolean", "null"]
        canControl:
          description: >-
            True when there is an active remote device the tile can drive
            (play/pause/skip). False when nothing is controllable right now
            (no active Spotify device). Null when not applicable.
          type: ["boolean", "null"]
        device:
          description: >-
            The source's currently active playback device, when one exists
            (Spotify). Null when there is no active device or not applicable.
          oneOf:
            - $ref: "#/components/schemas/AudioDevice"
            - type: "null"

    AudioDevice:
      type: object
      required: [id, name, isActive]
      properties:
        id:
          description: Source-specific device identifier.
          type: ["string", "null"]
        name:
          description: Human-readable device name (e.g. "Living Room", "Web Player").
          type: string
        isActive:
          description: Whether this device is the one currently playing.
          type: boolean
        volumePercent:
          description: Device output volume 0–100, when the source reports it.
          type: ["number", "null"]

    NewsData:
      type: object
      required: [feedTitle, items]
      properties:
        feedTitle:
          description: >-
            The feed's own title (e.g. "BBC News"), used as a source label on
            the tile. Null when the feed does not provide one.
          type: ["string", "null"]
        items:
          description: Recent headlines parsed from the feed, newest first.
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"

    NewsItem:
      type: object
      required: [title, link]
      properties:
        title:
          description: The headline text.
          type: string
        link:
          description: >-
            URL of the full article. Null when the feed entry has no link, in
            which case the tile renders the headline as plain text.
          type: ["string", "null"]
        source:
          description: >-
            Per-item source/feed name when present (some aggregated feeds tag
            each entry). Null when not provided; the tile falls back to the
            feed title.
          type: ["string", "null"]
        published:
          description: >-
            ISO timestamp of when the item was published, when the feed provides
            one. Null otherwise.
          type: ["string", "null"]
