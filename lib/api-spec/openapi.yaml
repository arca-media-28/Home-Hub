openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Homelab Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: tiles
    description: Dashboard tiles
  - name: uploads
    description: Image uploads
  - name: widgets
    description: Live data widgets
  - name: connections
    description: Service connection settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tiles:
    get:
      operationId: getTiles
      tags: [tiles]
      summary: List all tiles for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tile"
    post:
      operationId: createTile
      tags: [tiles]
      summary: Create a new tile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tile"

  /tiles/{id}:
    get:
      operationId: getTile
      tags: [tiles]
      summary: Get a single tile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTile
      tags: [tiles]
      summary: Update a tile's config or position
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TileUpdate"
      responses:
        "200":
          description: Updated tile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tile"
    delete:
      operationId: deleteTile
      tags: [tiles]
      summary: Delete a tile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tiles/layout:
    put:
      operationId: saveLayout
      tags: [tiles]
      summary: Bulk-save tile layout (positions and sizes)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LayoutUpdate"
      responses:
        "200":
          description: Updated tiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tile"

  /uploads:
    get:
      operationId: listUploads
      tags: [uploads]
      summary: List the authenticated user's uploaded images
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Uploaded image list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadedFile"

  /uploads/{id}:
    delete:
      operationId: deleteUpload
      tags: [uploads]
      summary: Delete an uploaded image from the library
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /widgets/truenas:
    get:
      operationId: getTruenasMetrics
      tags: [widgets]
      summary: Get TrueNAS system metrics (CPU, RAM, ZFS pools)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: TrueNAS metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TruenasMetrics"

  /widgets/media:
    get:
      operationId: getMediaRecent
      tags: [widgets]
      summary: Get recently added media from Plex or Jellyfin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent media items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaItem"

  /widgets/media/continue:
    get:
      operationId: getMediaContinue
      tags: [widgets]
      summary: Get in-progress / on-deck media to continue watching from Plex
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Continue watching items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContinueWatchingItem"

  /widgets/sonarr:
    get:
      operationId: getSonarrQueue
      tags: [widgets]
      summary: Get upcoming shows or active download queue from Sonarr
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sonarr queue/calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SonarrData"

  /widgets/radarr:
    get:
      operationId: getRadarrQueue
      tags: [widgets]
      summary: Get upcoming movie releases or active download queue from Radarr
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Radarr queue/calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarrData"

  /widgets/qbittorrent:
    get:
      operationId: getQbittorrentStatus
      tags: [widgets]
      summary: Get active torrents and global transfer stats from qBittorrent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: qBittorrent torrents/transfer stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QbittorrentData"

  /widgets/pihole:
    get:
      operationId: getPiholeMetrics
      tags: [widgets]
      summary: Get DNS query/ad-block summary stats from Pi-hole
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pi-hole DNS stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PiholeData"

  /widgets/nginx-proxy-manager:
    get:
      operationId: getNginxProxyManagerData
      tags: [widgets]
      summary: Get proxy host, dead host, and SSL certificate summary from Nginx Proxy Manager
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Nginx Proxy Manager summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NginxProxyManagerData"

  /connections:
    get:
      operationId: getConnections
      tags: [connections]
      summary: List saved service connection settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Service connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceConnection"

  /connections/status:
    get:
      operationId: getConnectionsStatus
      tags: [connections]
      summary: Report current reachability of every saved service connection
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Per-service reachability status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceStatus"

  /connections/health:
    get:
      operationId: getConnectionHealth
      tags: [connections]
      summary: Last-known health of each saved connection from the background scheduler
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection health snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionHealth"

  /connections/{service}/test:
    post:
      operationId: testConnection
      tags: [connections]
      summary: Test a service connection using the supplied values without saving
      security:
        - bearerAuth: []
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
            enum: [truenas, plex, sonarr, radarr, qbittorrent, pihole, nginx-proxy-manager]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceConnectionUpdate"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /connections/{service}:
    put:
      operationId: updateConnection
      tags: [connections]
      summary: Save connection settings for a single service
      security:
        - bearerAuth: []
      parameters:
        - name: service
          in: path
          required: true
          schema:
            type: string
            enum: [truenas, plex, sonarr, radarr, qbittorrent, pihole, nginx-proxy-manager]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceConnectionUpdate"
      responses:
        "200":
          description: Updated connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceConnection"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AuthCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
        username:
          type: string

    Tile:
      type: object
      required: [id, userId, type, gridX, gridY, gridW, gridH]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [app, truenas, media, sonarr, radarr, qbittorrent]
        integration:
          type: ["string", "null"]
          enum: [truenas, media, sonarr, radarr, qbittorrent, pihole, nginx-proxy-manager, null]
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer
        name:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
        bgColor:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        imageFit:
          type: ["string", "null"]
          enum: ["cover", "contain", "none", "center", "top-left", null]
        imagePosition:
          description: >-
            Anchor key for how the image is aligned within the tile (e.g.
            "center", "top-left"). Null falls back to the legacy imageFit
            behavior.
          type: ["string", "null"]
        imageScale:
          description: >-
            Zoom percentage applied to the image (100 = native). Null means no
            scaling.
          type: ["integer", "null"]
        titleSize:
          description: >-
            Size key for the tile title on plain app/link tiles (e.g. "sm",
            "md", "lg", "xl"). Null means the default. Ignored by integration
            (widget) tiles.
          type: ["string", "null"]
        titlePosition:
          description: >-
            Anchor key for where the tile title sits on plain app/link tiles
            (e.g. "center", "top-left"). Null means the default. Ignored by
            integration (widget) tiles.
          type: ["string", "null"]
        titleColor:
          description: >-
            CSS color for the tile title text on plain app/link tiles. Null
            means the default (white over an image, theme color otherwise).
            Ignored by integration (widget) tiles.
          type: ["string", "null"]
        hideTitle:
          description: >-
            When true, the tile renders without its title text (image/widget
            content only). Defaults to false (title shown). Applies to both
            plain app/link tiles and integration (widget) tiles.
          type: boolean
        metrics:
          description: >-
            Enabled metric keys for this tile's integration. Null means "show
            all" (the default for tiles created before metric selection existed).
          type: ["array", "null"]
          items:
            type: string
        tileSettings:
          $ref: "#/components/schemas/TileSettings"
        createdAt:
          type: string

    TileInput:
      type: object
      required: [type, gridX, gridY, gridW, gridH]
      properties:
        type:
          type: string
          enum: [app, truenas, media, sonarr, radarr, qbittorrent]
        integration:
          type: ["string", "null"]
          enum: [truenas, media, sonarr, radarr, qbittorrent, pihole, nginx-proxy-manager, null]
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer
        name:
          type: string
        url:
          type: string
        bgColor:
          type: string
        imageUrl:
          type: string
        imageFit:
          type: string
        imagePosition:
          type: string
        imageScale:
          type: integer
        titleSize:
          type: ["string", "null"]
        titlePosition:
          type: ["string", "null"]
        titleColor:
          type: ["string", "null"]
        hideTitle:
          type: boolean
        metrics:
          type: ["array", "null"]
          items:
            type: string
        tileSettings:
          $ref: "#/components/schemas/TileSettings"

    TileUpdate:
      type: object
      properties:
        integration:
          type: ["string", "null"]
          enum: [truenas, media, sonarr, radarr, qbittorrent, pihole, nginx-proxy-manager, null]
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer
        name:
          type: string
        url:
          type: string
        bgColor:
          type: string
        imageUrl:
          type: ["string", "null"]
        imageFit:
          type: string
        imagePosition:
          type: ["string", "null"]
        imageScale:
          type: ["integer", "null"]
        titleSize:
          type: ["string", "null"]
        titlePosition:
          type: ["string", "null"]
        titleColor:
          type: ["string", "null"]
        hideTitle:
          type: boolean
        metrics:
          type: ["array", "null"]
          items:
            type: string
        tileSettings:
          $ref: "#/components/schemas/TileSettings"

    TileSettings:
      description: >-
        Per-tile extra configuration for integration widgets. Null means no
        extra settings (the default). Currently carries the qBittorrent
        category filter; an absent or null categoryFilter means "show all
        categories".
      type: ["object", "null"]
      properties:
        categoryFilter:
          description: >-
            Allow-list of qBittorrent categories to show on the tile. Null (or
            absent) means show all categories.
          type: ["array", "null"]
          items:
            type: string
        groupByCategory:
          description: >-
            When true, the qBittorrent tile groups its torrents under category
            headers instead of showing a flat list. Absent or false means a
            flat list (the default).
          type: ["boolean", "null"]

    LayoutItem:
      type: object
      required: [id, gridX, gridY, gridW, gridH]
      properties:
        id:
          type: integer
        gridX:
          type: integer
        gridY:
          type: integer
        gridW:
          type: integer
        gridH:
          type: integer

    LayoutUpdate:
      type: object
      required: [tiles]
      properties:
        tiles:
          type: array
          items:
            $ref: "#/components/schemas/LayoutItem"

    UploadResult:
      type: object
      required: [url]
      properties:
        url:
          type: string

    UploadedFile:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
        url:
          type: string
        originalName:
          type: ["string", "null"]
        mimetype:
          type: ["string", "null"]
        size:
          type: ["integer", "null"]
        createdAt:
          type: ["string", "null"]

    ServiceConnection:
      type: object
      required: [service]
      properties:
        service:
          type: string
        url:
          type: ["string", "null"]
        apiKey:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        password:
          type: ["string", "null"]
        token:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]

    ServiceConnectionUpdate:
      type: object
      properties:
        url:
          type: string
        apiKey:
          type: string
        username:
          type: string
        password:
          type: string
        token:
          type: string

    ConnectionTestResult:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    ServiceStatus:
      type: object
      required: [service, configured, ok, message]
      properties:
        service:
          type: string
        configured:
          type: boolean
        ok:
          type: boolean
        message:
          type: string

    ConnectionHealth:
      type: object
      required: [service, ok, message, checkedAt]
      properties:
        service:
          type: string
        ok:
          type: boolean
        message:
          type: string
        checkedAt:
          type: string

    TruenasMetrics:
      type: object
      required: [cpuPercent, memUsedGb, memTotalGb, pools]
      properties:
        cpuPercent:
          type: number
        memUsedGb:
          type: number
        memTotalGb:
          type: number
        pools:
          type: array
          items:
            $ref: "#/components/schemas/ZfsPool"

    ZfsPool:
      type: object
      required: [name, status, usedBytes, totalBytes]
      properties:
        name:
          type: string
        status:
          type: string
        usedBytes:
          type: number
        totalBytes:
          type: number

    MediaItem:
      type: object
      required: [id, title, type]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        year:
          type: ["integer", "null"]
        thumb:
          type: ["string", "null"]
        addedAt:
          type: ["string", "null"]
        seriesName:
          type: ["string", "null"]
        seasonLabel:
          type: ["string", "null"]
        url:
          type: ["string", "null"]

    ContinueWatchingItem:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: ["string", "null"]
        seriesName:
          type: ["string", "null"]
        thumb:
          type: ["string", "null"]
        progress:
          type: ["number", "null"]
        url:
          type: ["string", "null"]

    SonarrData:
      type: object
      required: [queue, upcoming]
      properties:
        queue:
          type: array
          items:
            $ref: "#/components/schemas/SonarrQueueItem"
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/SonarrUpcomingItem"

    SonarrQueueItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        progress:
          type: ["number", "null"]
        size:
          type: ["number", "null"]

    SonarrUpcomingItem:
      type: object
      required: [id, title, airDate]
      properties:
        id:
          type: integer
        title:
          type: string
        seriesTitle:
          type: string
        airDate:
          type: string
        seasonNumber:
          type: ["integer", "null"]
        episodeNumber:
          type: ["integer", "null"]

    RadarrData:
      type: object
      required: [queue, upcoming]
      properties:
        queue:
          type: array
          items:
            $ref: "#/components/schemas/RadarrQueueItem"
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/RadarrUpcomingItem"

    RadarrQueueItem:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        progress:
          type: ["number", "null"]
        size:
          type: ["number", "null"]

    RadarrUpcomingItem:
      type: object
      required: [id, title, releaseDate]
      properties:
        id:
          type: integer
        title:
          type: string
        releaseDate:
          type: string
        year:
          type: ["integer", "null"]

    QbittorrentData:
      type: object
      required: [torrents, downloadSpeed, uploadSpeed, categories]
      properties:
        torrents:
          type: array
          items:
            $ref: "#/components/schemas/QbittorrentTorrent"
        downloadSpeed:
          type: number
        uploadSpeed:
          type: number
        categories:
          description: >-
            All category names defined in qBittorrent, including categories
            that currently have no active torrents. Sourced from qBittorrent's
            dedicated categories endpoint so the tile filter can list every
            category even when nothing is downloading or seeding.
          type: array
          items:
            type: string

    QbittorrentTorrent:
      type: object
      required: [name, progress, state, dlSpeed, upSpeed, category]
      properties:
        name:
          type: string
        progress:
          type: number
        state:
          type: string
        dlSpeed:
          type: number
        upSpeed:
          type: number
        category:
          description: >-
            The qBittorrent category assigned to this torrent, or an empty
            string when uncategorized.
          type: string

    PiholeData:
      type: object
      required: [queriesTotal, adsBlocked, adsPercentage, domainsBlocked, status]
      properties:
        queriesTotal:
          type: number
        adsBlocked:
          type: number
        adsPercentage:
          type: number
        domainsBlocked:
          type: number
        status:
          type: string
          enum: [enabled, disabled]

    NginxProxyManagerData:
      type: object
      required: [total, enabled, offline, deadHostsCount, expiringCertsCount, proxyHosts]
      properties:
        total:
          description: Total number of configured proxy hosts.
          type: integer
        enabled:
          description: Number of enabled proxy hosts.
          type: integer
        offline:
          description: Number of enabled proxy hosts Nginx reports as offline.
          type: integer
        deadHostsCount:
          description: Number of 404 (dead) hosts configured.
          type: integer
        expiringCertsCount:
          description: Number of proxy hosts whose SSL certificate is expired or expiring soon.
          type: integer
        proxyHosts:
          type: array
          items:
            $ref: "#/components/schemas/NginxProxyHost"

    NginxProxyHost:
      type: object
      required: [id, domainNames, enabled, online, ssl, sslExpiring]
      properties:
        id:
          type: integer
        domainNames:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        online:
          type: boolean
        ssl:
          description: Whether the host has an SSL certificate attached.
          type: boolean
        sslExpiring:
          description: Whether the attached SSL certificate is expired or expiring soon.
          type: boolean
