services:
  homelab-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homelab-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      # The app always listens on 3000 inside the container. To change the
      # host port, set PORT in your .env (it only affects the host side above).
      - PORT=3000
      # SQLite database file and uploaded images live in the mounted /data volume
      - DATA_DIR=/data
    # All secrets and optional service credentials live in a gitignored `.env`
    # file so they never end up in this tracked file. Copy `.env.example` to
    # `.env` and fill in your values. Because `.env` is ignored, `git pull` will
    # never conflict on your secrets.
    env_file:
      - path: .env
        required: false
    volumes:
      # SQLite database file and uploaded images persist here
      - homelab-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homelab-data:
    driver: local
